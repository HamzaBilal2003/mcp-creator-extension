<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 16px 0;
      color: #60a5fa;
      font-size: 18px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status.running {
      background: #0e3a2f;
      border: 1px solid #34d399;
      color: #6ee7b7;
    }
    .status.stopped {
      background: #3a0e0e;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.green { background: #34d399; }
    .dot.red { background: #ef4444; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #a0a0a0;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #3b3b5c;
      border-radius: 4px;
      background: #0d2a47;
      color: #e0e0e0;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    textarea {
      min-height: 80px;
      font-family: 'Courier New', monospace;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-secondary {
      background: #1e3a5f;
      color: #93c5fd;
      border: 1px solid #3b82f6;
    }
    .btn-secondary:hover {
      background: #2d4a6f;
    }
    .btn-success {
      background: #059669;
      color: white;
    }
    .btn-success:hover {
      background: #047857;
    }
    #result {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    #result.success {
      background: #0e3a2f;
      border: 1px solid #34d399;
      color: #6ee7b7;
    }
    #result.error {
      background: #3a0e0e;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }

    /* Auto-scrape toggle */
    .auto-toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #0d1f3c;
      border: 1px solid #2d3a5c;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .auto-toggle-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #93c5fd;
      font-weight: 600;
      margin: 0;
    }
    .auto-badge {
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 99px;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: all 0.3s;
    }
    .auto-badge.on  { background: #064e3b; color: #34d399; border: 1px solid #34d399; }
    .auto-badge.off { background: #3b0e0e; color: #f87171; border: 1px solid #ef4444; }
    /* Toggle switch */
    .toggle-switch {
      position: relative;
      width: 42px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      margin: 0;
      padding: 0;
    }
    .toggle-slider {
      position: absolute;
      inset: 0;
      background: #374151;
      border-radius: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      left: 3px;
      top: 3px;
      background: #9ca3af;
      border-radius: 50%;
      transition: transform 0.3s, background 0.3s;
    }
    .toggle-switch input:checked + .toggle-slider {
      background: #1d4ed8;
    }
    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
      background: #60a5fa;
    }
  </style>
</head>
<body>
  <h2>🧩 DOM Scraper MCP</h2>
  
  <div id="mcpStatus" class="status stopped">
    <span class="dot red"></span>
    <span>MCP Server: Checking...</span>
  </div>

  <!-- Auto Scrape & Send Toggle -->
  <div class="auto-toggle-row">
    <span class="auto-toggle-label">
      ⚡ Auto Scrape &amp; Send
      <span id="autoBadge" class="auto-badge off">OFF</span>
    </span>
    <label class="toggle-switch">
      <input type="checkbox" id="autoScrapeToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <label>Scraping Schema (JSON)</label>
  <textarea id="schemaInput" placeholder='e.g., {"selector": ".card", "fields": {"title": ".title"}}'></textarea>

  <button class="btn-primary" id="saveSchema">Save Schema</button>
  <button class="btn-secondary" id="scrapeData">Scrape Current Page</button>
  <button class="btn-success" id="sendToMcp">Send to MCP Server</button>

  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
