<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }
    h2 {
      margin: 0 0 16px 0;
      color: #60a5fa;
      font-size: 18px;
    }
    .status {
      padding: 8px 12px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status.running {
      background: #0e3a2f;
      border: 1px solid #34d399;
      color: #6ee7b7;
    }
    .status.stopped {
      background: #3a0e0e;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    .dot.green { background: #34d399; }
    .dot.red { background: #ef4444; }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: #a0a0a0;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      border: 1px solid #3b3b5c;
      border-radius: 4px;
      background: #0d2a47;
      color: #e0e0e0;
      font-size: 13px;
      box-sizing: border-box;
      margin-bottom: 12px;
    }
    textarea {
      min-height: 80px;
      font-family: 'Courier New', monospace;
    }
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover {
      background: #2563eb;
    }
    .btn-secondary {
      background: #1e3a5f;
      color: #93c5fd;
      border: 1px solid #3b82f6;
    }
    .btn-secondary:hover {
      background: #2d4a6f;
    }
    .btn-success {
      background: #059669;
      color: white;
    }
    .btn-success:hover {
      background: #047857;
    }
    #result {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      display: none;
    }
    #result.success {
      background: #0e3a2f;
      border: 1px solid #34d399;
      color: #6ee7b7;
    }
    #result.error {
      background: #3a0e0e;
      border: 1px solid #ef4444;
      color: #fca5a5;
    }
  </style>
</head>
<body>
  <h2>🧩 DOM Scraper MCP</h2>
  
  <div id="mcpStatus" class="status stopped">
    <span class="dot red"></span>
    <span>MCP Server: Checking...</span>
  </div>

  <label>Scraping Schema (JSON)</label>
  <textarea id="schemaInput" placeholder='e.g., {"selector": ".card", "fields": {"title": ".title"}}'></textarea>

  <button class="btn-primary" id="saveSchema">Save Schema</button>
  <button class="btn-secondary" id="scrapeData">Scrape Current Page</button>
  <button class="btn-success" id="sendToMcp">Send to MCP Server</button>

  <div id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
